front:
  text: 二經同卷廣四
  hash: sha256:e6370b10ef33d622f5513c8a7e141ec652feacec2e9d362c6a5444b0ce97ee55
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0142_HFL_000-001a, image: hfl/1031/1031-004.png}
body:
  text: 洞真太上神虎玉經洞真太上神虎隱文洞真太上神虎玉經王君曰神虎真符太真九天父毋所出太真丈人以傳東海小童九天真王以傳太上道君太上道君常所寳祕藏於太㣲靈都瓊宫玉房之裏衛以巨獸扞以毒龍神虎七千備于玉闕金晨玉童素靈玉女各三百人侍衛靈文玄暉空映散煙紫庭威振九遐之域神光煥乎上清妙暢啓於自然洞慧徹於无形神虎班其匠金虎亘其真智慧標其榦消魔其演源㣲㫖幽邃妙趣難詳皆著天魔隱諱或標百神内名誦其章千精駭動詠其篇萬妖束形以三天立正之始傳付太㣲天帝君使威制六天斬馘萬神攝山召海束縳群靈威魔滅試逥轉五星於是太㣲天帝君奉受消魔智慧神金二符佩遊上清乘虚逸駕浮輪太㣲澄景太真之舘上足玉帝之階静與天地合契動與七景齊暉匡落九玄握節靈機領括萬度億津揔歸激百陽以生電運千隂以吐威晨霞披道於金闕天關應感而自開命八景以髙登騁神虎以昇飛群仙啓路七星奔移玄光冥滯億變萬尊洞觀无窮之境周覽極天之涯流目盼於五濁哀生生以告衰可謂㣲乎真符靈化之妙哉太㣲天帝君告上相青童君西城王君曰上清大智慧文消魔真經此太極之玉篇髙上之寳訣神虎真符九天太真所重寳章智慧可以逐穢消魔可以束邪真符可以制魔夫有玉簡紫名得修上法莫不爲衆祅所乘萬魔所試若欲使萬害不能傷萬試不能干皆神虎之威真經之妙用也今以相付可傳後學應爲真人者當依太真之科七百年内聽得三傳不得示非其人輕露真文身被風刀之考殃及七玄若有金名東華録字上清者得吾此符便以玉童玉女三十六人侍衛子身則可以經危冒險越山跨海召神制鬼封掌靈岳所之所向千妖伏匿萬魔朿形群仙侍衛身生異光修未七年真靈自當降子之房飛輿緑軿白日登晨受者對齋九十日或三十日或七日皆齎上金十兩以爲神眞之信錦九十尺以誓九天青繒三十尺以盟其心好道樂眞勤心注玄无恡財物輕物貴道道无不存如此之士始可與言内愛財寳外心浮好道亦已照閉之玉笈藏於金闕昇度之後藏之名山神虎内真符佩神虎上符以青爲地黄書之若之五岳并在戹難之中鬼魅之地皆當作威神大呪叩左齒三十六通呪曰九天玄音醜節兼和總統幽張開神百華越滯无迹三監羅波逥素滿景珠欎幄沙丹明總命梨㧞劫阿合光映遂登來盈家伯樂乘元運策天魔調更絶種滅形九羅虎變神威攝制萬邪斬戮无大自小皆殂妖絶九隂禍滅太和乗景䇿虚上躡飛霞出入帝庭長保靈柯畢咽炁三十六過止不受神虎上符不得妄誦此呪此呪皆九天大魔内諱一祝九天駭動萬鬼朿形千精喪目百神詣庭不受而妄誦皆亡魂失魄髙上滅魔之祝亦如此明愼之焉又有消魔符及神虎文符在消魔經中悉是九天魔王之隱音也亦應佩此祝符之時悉服一枚益佳興寧三年乙丑歳七月一日桐栢真人授道士許逺遊言至甲申乙亥壬辰癸巳之歳九月一日七月七日四月八日當有道士著七色法衣手持九曲䇿杖或在靈壇之所或在人間告乞或詠經詩或作狂歌子若見之勤請其道必授子神虎上符此南岳真人太上常使其時下在人間察視學道者心洞真太上神虎玉經
